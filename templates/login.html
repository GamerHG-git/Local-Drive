<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Local Drive</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .card { background: #fff; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 360px; padding: 32px; text-align: center; }
        .logo { width: 80px; height: 80px; margin: 0 auto 16px; object-fit: contain; }
        .title { font-size: 24px; font-weight: 600; color: #1f2937; margin-bottom: 4px; }
        .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 32px; }
        .flash { margin-bottom: 16px; padding: 12px 16px; border-radius: 12px; font-size: 14px; color: #fff; }
        .flash-error { background: #ef4444; }
        .flash-success { background: #16a34a; }
        .input { width: 100%; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px 16px; font-size: 14px; outline: none; background: #f9fafb; margin-bottom: 16px; color: #374151; }
        .input:focus { border-color: #22c55e; box-shadow: 0 0 0 2px rgba(34,197,94,0.2); background: #fff; }
        .btn { width: 100%; background: #16a34a; color: #fff; padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; transition: background 0.15s; }
        .btn:hover { background: #15803d; }
        .btn.loading { opacity: 0.7; pointer-events: none; }
        
        /* Loading screen */
        .loading-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 16px; }
        .loading-overlay.hidden { display: none; }
        .loading-logo { width: 80px; height: 80px; animation: pulse 1.5s ease-in-out infinite; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: #22c55e; border-radius: 50%; animation: spin 1s linear infinite; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (prefers-color-scheme: dark) {
            body { background: linear-gradient(135deg, #111 0%, #1a1a1a 100%); }
            .card { background: #1a1a1a; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
            .title { color: #eee; }
            .subtitle { color: #888; }
            .input { background: #222; border-color: #333; color: #eee; }
            .input:focus { background: #222; border-color: #22c55e; }
            .loading-overlay { background: linear-gradient(135deg, #111 0%, #1a1a1a 100%); }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingScreen">
        <img src="/static/Ldrivelogo.png" class="loading-logo" alt="Loading">
        <div class="loading-spinner"></div>
    </div>

    <div class="card">
        <img src="/static/Ldrivelogo.png" class="logo" alt="Local Drive">
        <h1 class="title">Local Drive</h1>
        <p class="subtitle">Sign in to continue</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {% if category == 'error' %}flash-error{% else %}flash-success{% endif %}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" id="loginForm">
            <input type="text" name="username" placeholder="Username" required class="input">
            <input type="password" name="password" placeholder="Password" required class="input">
            <button type="submit" class="btn" id="loginBtn">Sign in</button>
        </form>
    </div>

    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 500);
        });

        document.getElementById('loginForm').addEventListener('submit', function() {
            document.getElementById('loginBtn').classList.add('loading');
            document.getElementById('loginBtn').textContent = 'Signing in...';
            document.getElementById('loadingScreen').classList.remove('hidden');
        });
    </script>
</body>
</html>
